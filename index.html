<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Debugging script to catch window.fetch overrides
      (function() {
        try {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(v) { 
              console.warn('An attempt to overwrite window.fetch was detected and blocked.', v);
              // We don't throw an error here to avoid crashing, but we log it.
            },
            configurable: true
          });
        } catch (e) {
          console.error('Could not set up fetch debug guard:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
